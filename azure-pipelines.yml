# =============================================================================
# azure-pipelines.yml — aes-hotsite
#
# Pipeline CI/CD para deploy no Azure App Service Linux.
# Padrao estabelecido no projeto obraxs-hotsite, adaptado para:
#   - Next.js 16 standalone + Prisma 7 (SQL Server)
#   - Deploy via Azure App Service (nao Docker)
#   - Sem testes unitarios por enquanto (apenas lint)
#
# Pre-requisitos no Azure DevOps:
#   1. Variable Group "aes-hotsite-vars" vinculado a este pipeline
#   2. Service Connection "aes-next-connection" para o App Service
# =============================================================================

trigger:
  branches:
    include:
      - main

pr: none

# =============================================================================
# Variaveis globais do pipeline
# =============================================================================
variables:
  azureSubscription: 'aes-next-connection'
  appName: 'aes-next-prod'
  nodeVersion: '20.x'
  packagePath: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'

# =============================================================================
# STAGE 1 — CI: Lint + Validacoes
# Roda em todo push para garantir qualidade antes do build
# =============================================================================
stages:
- stage: CI
  displayName: 'CI — Lint e Validacoes'
  pool:
    vmImage: 'ubuntu-latest'
  jobs:
  - job: LintAndValidate
    displayName: 'Lint + Type Check'
    steps:
    - task: NodeTool@0
      displayName: 'Configurar Node.js $(nodeVersion)'
      inputs:
        versionSpec: '$(nodeVersion)'

    - task: Cache@2
      displayName: 'Cache npm'
      inputs:
        key: 'npm | "$(Agent.OS)" | package-lock.json'
        restoreKeys: |
          npm | "$(Agent.OS)"
        path: $(Pipeline.Workspace)/.npm

    - script: |
        npm ci --cache $(Pipeline.Workspace)/.npm
      displayName: 'npm ci'

    - script: npm run lint
      displayName: 'ESLint'

    - script: npm audit --audit-level=high
      displayName: 'npm audit — CVEs high/critical'

# =============================================================================
# STAGE 2 — Build: Prisma Generate + Next.js Build + Artefato
# Depende do CI para garantir que nao deployamos codigo quebrado
# =============================================================================
- stage: Build
  displayName: 'Build — Next.js'
  dependsOn: CI
  pool:
    vmImage: 'ubuntu-latest'
  jobs:
  - job: Build
    displayName: 'Prisma generate + next build'
    steps:
    - checkout: self
      clean: true

    - task: NodeTool@0
      displayName: 'Configurar Node.js $(nodeVersion)'
      inputs:
        versionSpec: '$(nodeVersion)'

    - task: Cache@2
      displayName: 'Cache npm'
      inputs:
        key: 'npm | "$(Agent.OS)" | package-lock.json'
        restoreKeys: |
          npm | "$(Agent.OS)"
        path: $(Pipeline.Workspace)/.npm

    - script: |
        npm ci --cache $(Pipeline.Workspace)/.npm
      displayName: 'npm ci'

    - script: |
        npm run build
      displayName: 'prisma generate + next build'
      env:
        NODE_ENV: production
        DATABASE_URL: $(DATABASE_URL)
        NEXTAUTH_SECRET: $(NEXTAUTH_SECRET)
        NEXTAUTH_URL: $(NEXTAUTH_URL)
        AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING)

    - script: |
        set -e
        test -f .next/standalone/server.js
        mkdir -p package
        cp -R .next/standalone/* package/
        cp -R .next package/.next
        if [ -d public ]; then cp -R public package/public; fi
      displayName: 'Preparar artefato standalone'

    - task: ArchiveFiles@2
      displayName: 'Compactar artefato'
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)/package'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(packagePath)'
        replaceExistingArchive: true

    - publish: '$(packagePath)'
      artifact: drop
      displayName: 'Publicar artefato'

# =============================================================================
# STAGE 3 — Deploy: Azure App Service Linux
# =============================================================================
- stage: Deploy
  displayName: 'Deploy — Producao'
  dependsOn: Build
  condition: succeeded()
  pool:
    vmImage: 'ubuntu-latest'
  jobs:
  - deployment: DeployToAppService
    displayName: 'Deploy para Azure App Service Linux'
    environment: '$(appName)'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - task: AzureWebApp@1
            displayName: 'Deploy no App Service'
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: webAppLinux
              appName: '$(appName)'
              package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
              runtimeStack: 'NODE|20-lts'
              startUpCommand: 'node server.js'
              appSettings: '-NODE_ENV production'
