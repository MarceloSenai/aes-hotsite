# Azure Pipeline — AES Hotsite
# Trigger: push to main → Build Next.js standalone → Deploy to Azure App Service

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: aes-hotsite-vars

stages:
  # ── Build ──────────────────────────────────────────────────
  - stage: Build
    displayName: 'Build Next.js'
    jobs:
      - job: BuildJob
        displayName: 'Install, Generate, Build'
        steps:
          - task: NodeTool@0
            displayName: 'Use Node 20'
            inputs:
              versionSpec: '20.x'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npx prisma generate
            displayName: 'Generate Prisma Client'

          - script: npm run build
            displayName: 'Build Next.js (standalone)'
            env:
              DATABASE_URL: $(DATABASE_URL)
              NEXTAUTH_SECRET: $(NEXTAUTH_SECRET)
              NEXTAUTH_URL: $(NEXTAUTH_URL)

          # Standalone output needs static + public files copied in
          - script: |
              cp -r public .next/standalone/public
              cp -r .next/static .next/standalone/.next/static
            displayName: 'Copy static assets to standalone'

          - task: ArchiveFiles@2
            displayName: 'Package standalone build'
            inputs:
              rootFolderOrFile: '.next/standalone'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'

          - publish: '$(Build.ArtifactStagingDirectory)/app.zip'
            artifact: 'drop'
            displayName: 'Publish artifact'

  # ── Deploy ─────────────────────────────────────────────────
  - stage: Deploy
    displayName: 'Deploy to Azure'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployJob
        displayName: 'Deploy to App Service'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  displayName: 'Deploy to Azure App Service'
                  inputs:
                    azureSubscription: 'AES-Azure'
                    appType: 'webAppLinux'
                    appName: 'aes-hotsite'
                    package: '$(Pipeline.Workspace)/drop/app.zip'
                    runtimeStack: 'NODE|20-lts'
                    startUpCommand: 'node server.js'
