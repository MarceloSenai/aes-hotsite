# =============================================================================
# Pipeline avulso para liberar o firewall do Azure SQL (aesdb).
# Roda manualmente (trigger: none). Usa a service connection 'aes-next-connection'
# que já tem acesso ao Azure (a mesma do deploy).
#
# Como usar no Azure DevOps:
#   Pipelines -> New pipeline -> Azure Repos Git -> repo AES
#   -> Existing Azure Pipelines YAML file -> /azure-pipelines-firewall.yml -> Run
# =============================================================================
trigger: none
pr: none

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: AzureCLI@2
  displayName: 'Liberar firewall do Azure SQL aesdb'
  inputs:
    azureSubscription: 'aes-next-connection'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      set -e
      echo "Procurando o servidor SQL 'aesdb'..."
      RG=$(az sql server list --query "[?name=='aesdb'].resourceGroup | [0]" -o tsv)
      if [ -z "$RG" ]; then
        echo "ERRO: servidor 'aesdb' nao encontrado nesta assinatura."
        echo "Assinatura atual:"; az account show -o table || true
        exit 1
      fi
      echo "Resource Group encontrado: $RG"

      echo "Criando regra de firewall liberando todos os IPs..."
      az sql server firewall-rule create \
        --resource-group "$RG" \
        --server aesdb \
        --name AllowAllForVercel \
        --start-ip-address 0.0.0.0 \
        --end-ip-address 255.255.255.255

      echo "Regras de firewall atuais:"
      az sql server firewall-rule list --resource-group "$RG" --server aesdb -o table
      echo "FIREWALL LIBERADO COM SUCESSO."
